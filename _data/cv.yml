  summary: >
    Innovative and driven AI practitioner with over a decade of experience across
    robotics, software engineering, and product management. Currently pursuing a Master
    of Artificial Intelligence at the University of Auckland, with a strong focus on
    ethical and human-centered applications of AI in education and digital health. Proven
    ability to lead cross-functional, international teams and deliver intelligent systems
    from concept to deployment. Passionate about building AI-powered solutions that
    enhance personalized learning, improve health outcomes, and empower individuals
    through data-driven insight.

