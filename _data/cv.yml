        highlights:
          - Delivered deployed AI prototypes in Python and C++, integrating NLP (speech recognition, dialogue systems) and computer vision (face and emotion detection) for Pepper and NAO across 3,000+ educational installations.
          - Developed and scaled platforms including RoboBlocks, Robot Management Console, and Choregraphe, enabling modular robot task orchestration and analytics dashboards.
          - Engineered ETL pipelines and telemetry frameworks to manage and monitor robot health data, deploying Dockerized dashboards on Linux servers for remote device control.
          - Prototyped autonomous navigation using ROS + SLAM (e.g. ORB-SLAM2) and ML vision models for object detection, scene understanding, and mapping.
          - Collaborated with global teams in Japan, France, and China, synchronizing algorithm roadmaps, SDK releases, and training programs to support ecosystem growth (~17K units globally).
          - Delivered developer training on Pepper/NAO SDKs, ROS frameworks, and remote deployment — enabling 1,000+ global partners to prototype educational and healthcare solutions.

