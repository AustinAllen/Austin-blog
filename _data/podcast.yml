# -----------------------------------------------------------------------------
# Podcast CATEGORIES for the /podcast/ tab.
#
# This file defines the category "shelves" and their order on the index page.
# The actual EPISODES are individual files in the `_podcast/` folder — each one
# becomes its own page (with its own URL and comments section), just like the
# projects in `_projects/`.
#
# TO ADD A CATEGORY: add an entry below with a unique `id`, a `name`, and an
# optional `description`. Order here = order on the page.
#
# TO ADD AN EPISODE: create a file in `_podcast/`, e.g. `_podcast/my-episode.md`:
#
#   ---
#   layout: podcast_episode
#   title: "My episode title"
#   date: 2026-07-05
#   category: football          # must match an `id` below
#   youtube: "REPLACE_11_CHAR_ID"
#   description: "One-line summary."
#   giscus_comments: true       # enables the comments section on that page
#   ---
#
#   Optional show notes / links go here in Markdown.
# -----------------------------------------------------------------------------

- id: ai-agent
  name: AI Agent
  description: "Building, using, and reasoning about LLM-powered agents — the through-line of my work and my blog series."

- id: ai-research
  name: AI Research
  description: "Walking through papers, models, and ideas I've been reading — the same notes that show up on the blog, in conversation form."

- id: physical-ai
